services:
  db:
    image: postgres:16-alpine
    container_name: ledger-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ledger}
      POSTGRES_DB: ${POSTGRES_DB:-ledger}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ledger}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ledger-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      # Inside the compose network the DB host is the service name "db"
      DATABASE_URL: postgresql://${POSTGRES_USER:-ledger}:${POSTGRES_PASSWORD:-ledger}@db:5432/${POSTGRES_DB:-ledger}?schema=public
    ports:
      - "5001:5001"
    # Apply migrations, then start the compiled server
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

volumes:
  pgdata:
